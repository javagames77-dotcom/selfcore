<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
[data-theme="light"]{--bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0f0ed;--border:#e8e8e4;--border2:#d0d0ca;--text:#1a1a1a;--muted:#6b6b6b;--muted2:#b0b0b0;--black:#0a0a0a;--nav-bg:rgba(255,255,255,.96);--sidebar-bg:#ffffff;--input-bg:#fafaf8;--theme-btn-bg:#f0f0ed;--theme-btn-color:#6b6b6b;--card-bg:#ffffff;--card-shadow:0 1px 3px rgba(0,0,0,.06);--tbl-hover:#fafafa;--accent:#1D9E75;--accent-hover:#0F6E56;--accent-light:#E1F5EE;--tag-green-bg:#f0fdf4;--tag-green:#16a34a;--tag-red-bg:#fff0f0;--tag-red:#c0392b;--tag-amber-bg:#fffbeb;--tag-amber:#b45309;--tag-blue-bg:#eff6ff;--tag-blue:#1d4ed8;--tag-purple-bg:#f5f3ff;--tag-purple:#6d28d9}
[data-theme="dark"]{--bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;--border:#2a2a2a;--border2:#3d3d3d;--text:#f0f0f0;--muted:#888;--muted2:#555;--black:#f0f0f0;--nav-bg:rgba(15,15,15,.97);--sidebar-bg:#0f0f0f;--input-bg:#161616;--theme-btn-bg:#1e1e1e;--theme-btn-color:#888;--card-bg:#161616;--card-shadow:0 1px 3px rgba(0,0,0,.3);--tbl-hover:#1e1e1e;--accent:#1D9E75;--accent-hover:#5DCAA5;--accent-light:#04342C;--tag-green-bg:#0a2010;--tag-green:#4ade80;--tag-red-bg:#2a1010;--tag-red:#ff7070;--tag-amber-bg:#2a1800;--tag-amber:#fbbf24;--tag-blue-bg:#0c1a3a;--tag-blue:#93c5fd;--tag-purple-bg:#1a0a3a;--tag-purple:#c084fc}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg2);color:var(--text);font-size:13px;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}

/* NAV */
.nav{height:48px;background:var(--nav-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:200;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:background .2s,border-color .2s}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.logo-icon{display:grid;grid-template-columns:repeat(4,5px);grid-template-rows:repeat(4,5px);gap:1.5px;flex-shrink:0}
.lc{width:5px;height:5px;border-radius:1.2px}
.logo-text-wrap{display:flex;flex-direction:column;position:relative;height:24px;width:44px}
.logo-self{position:absolute;top:2px;left:0;font-size:11px;font-weight:300;letter-spacing:-.2px;color:var(--muted2);line-height:.73}
.logo-core{position:absolute;bottom:0;left:0;font-size:14px;font-weight:600;letter-spacing:-.4px;color:var(--black);line-height:.73;transition:color .2s}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.nav-badge{font-size:10px;font-weight:500;color:var(--muted);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px 10px;letter-spacing:.02em}
.nav-divider{width:1px;height:18px;background:var(--border);flex-shrink:0}
.nav-btn{font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;cursor:pointer;font-family:inherit;transition:all .12s}
.nav-btn:hover{border-color:var(--border2);color:var(--text);background:var(--bg2)}
.theme-toggle{width:32px;height:32px;background:var(--theme-btn-bg);border:1px solid var(--border);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--theme-btn-color);flex-shrink:0}
.theme-toggle:hover{border-color:var(--border2)}
.lang-switcher{display:flex;align-items:center;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:3px}
.lang-btn{padding:3px 8px;border:none;border-radius:5px;background:transparent;color:var(--muted);font-size:11px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .15s;letter-spacing:.02em}
.lang-btn.active{background:var(--bg);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 48px)}

/* SIDEBAR */
.sidebar{width:220px;flex-shrink:0;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:background .2s,border-color .2s;overflow-y:auto}
.sidebar-user{padding:14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.sidebar-user-info{min-width:0}
.sidebar-user-name{font-size:12px;font-weight:500;color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s}
.sidebar-user-role{font-size:10px;color:var(--muted2)}
.sidebar-section{padding:14px 12px 6px;font-size:10px;font-weight:500;color:var(--muted2);letter-spacing:.08em;text-transform:uppercase}
.sitem{display:flex;align-items:center;gap:9px;padding:7px 12px;margin:1px 6px;border:none;border-radius:7px;background:transparent;color:var(--muted);font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .12s;text-align:left;width:calc(100% - 12px);text-decoration:none}
.sitem:hover{background:var(--bg3);color:var(--text)}
.sitem.active{background:var(--accent-light);color:var(--accent)}
.sitem svg{flex-shrink:0;width:15px;height:15px}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:24px}

/* VIEWS */
.view{display:none}
.view.active{display:block}

/* PAGE HEADER */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.page-title{font-size:16px;font-weight:600;color:var(--black);letter-spacing:-.02em}

/* CARDS */
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;box-shadow:var(--card-shadow);transition:all .2s}
.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:16px}
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:16px}

/* METRIC CARD */
.metric-card{padding:14px 16px;cursor:default}
.metric-label{font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.metric-val{font-size:22px;font-weight:500;color:var(--black);line-height:1}
.metric-unit{font-size:12px;font-weight:400;color:var(--muted);margin-left:2px}
.metric-delta{font-size:11px;margin-top:5px;color:var(--muted)}
.delta-up{color:var(--tag-green)}
.delta-dn{color:var(--tag-red)}

/* MODULE CARD */
.mod-card{padding:16px;cursor:pointer;transition:border-color .15s}
.mod-card:hover{border-color:var(--border2)}
.mod-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:16px}
.mod-name{font-size:13px;font-weight:500;color:var(--black);margin-bottom:2px}
.mod-sub{font-size:11px;color:var(--muted)}
.mod-val{font-size:17px;font-weight:500;color:var(--black);margin-top:6px}

/* QUICK BUTTONS */
.quick-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.quick-btn{flex:1;min-width:120px;padding:8px 12px;background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;font-size:12px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;font-family:inherit}
.quick-btn:hover{background:var(--bg2);border-color:var(--border2);color:var(--text)}

/* BAR */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:12px;color:var(--muted);width:80px;flex-shrink:0}
.bar-track{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .4s}
.bar-val{font-size:12px;color:var(--muted);width:50px;text-align:right;flex-shrink:0}

/* CONTACTS PREVIEW */
.contact-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border)}
.contact-row:last-child{border-bottom:none}
.cav{width:28px;height:28px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--muted);flex-shrink:0}
.cname{flex:1;font-size:12px;color:var(--text)}
.ctime{font-size:11px;color:var(--muted);white-space:nowrap}
.plat{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:500}
.pt{background:var(--tag-purple-bg);color:var(--tag-purple)}
.pv{background:#fbeaf0;color:#993556}
.pw{background:var(--tag-green-bg);color:var(--tag-green)}

/* CARD TITLE */
.card-title{font-size:13px;font-weight:500;color:var(--black);margin-bottom:12px;display:flex;align-items:center;gap:6px;padding:14px 16px 0}
.card-body{padding:0 16px 14px}

/* HEALTH GRID */
.health-icon-wrap{display:grid;grid-template-columns:repeat(4,5px);grid-template-rows:repeat(4,5px);gap:1.5px}
.hc{width:5px;height:5px;border-radius:1.2px}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500}
.tag-green{background:var(--tag-green-bg);color:var(--tag-green)}
.tag-amber{background:var(--tag-amber-bg);color:var(--tag-amber)}
.tag-red{background:var(--tag-red-bg);color:var(--tag-red)}
.tag-gray{background:var(--bg3);color:var(--muted)}
.req-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.req-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:background .2s,border-color .2s}
.req-card-body{padding:16px}
.req-card-name{font-size:14px;font-weight:600;color:var(--black);margin-bottom:6px}
.req-card-row{font-size:12px;color:var(--muted);margin-bottom:3px}
.req-card-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.btn-success{background:var(--tag-green-bg);color:var(--tag-green);border:1px solid var(--tag-green);border-radius:7px;padding:6px 12px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .12s}
.btn-success:hover{opacity:.85}
.btn-danger{background:var(--tag-red-bg);color:var(--tag-red);border:1px solid var(--tag-red);border-radius:7px;padding:6px 12px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .12s}
.btn-danger:hover{opacity:.85}
.sitem-badge{margin-left:auto;background:var(--accent);color:#fff;border-radius:9px;font-size:10px;font-weight:700;padding:1px 6px;min-width:18px;text-align:center;display:none}
.sitem-badge.show{display:inline-block}
.loading-state{text-align:center;padding:48px;color:var(--muted);font-size:13px}
.empty-state{text-align:center;padding:48px;color:var(--muted2)}
.empty-text{font-size:13px;color:var(--muted)}
.tbl-wrap{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tbl{width:100%;border-collapse:collapse}
.tbl thead tr{border-bottom:1px solid var(--border)}
.tbl th{padding:10px 14px;text-align:left;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--tbl-hover)}
.act-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.act-btn:hover{border-color:var(--border2);color:var(--text)}
.act-btn.del:hover{border-color:var(--tag-red);color:var(--tag-red);background:var(--tag-red-bg)}
.btn-accent{width:100%;padding:10px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-accent:hover{opacity:.88}
.food-meal-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--border)}
.food-meal-row:last-child{border-bottom:none}
.food-meal-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}


/* TOAST */
#toast-container{position:fixed;bottom:1.5rem;right:1.5rem;z-index:99999;display:flex;flex-direction:column;gap:.5rem;pointer-events:none}
.toast{padding:.7rem 1.1rem;border-radius:10px;font-size:13px;font-weight:500;color:#fff;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,.18);opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast-success{background:#16a34a}
.toast-error{background:#dc2626}
.toast-info{background:var(--accent)}

/* MOB NAV */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--nav-bg);border-top:1px solid var(--border);z-index:199;backdrop-filter:blur(10px)}
.mob-nav-items{display:flex;height:100%}
.mob-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;color:var(--muted);font-size:9px;font-weight:500;font-family:inherit;cursor:pointer;transition:color .15s}
.mob-nav-btn.active{color:var(--accent)}

@media(max-width:768px){
  .sidebar{display:none}
  .mob-nav{display:block}
  .main{padding:16px;padding-bottom:72px}
  .grid4{grid-template-columns:repeat(2,1fr)}
  .grid3{grid-template-columns:repeat(2,1fr)}
  .nav-badge,.nav-divider{display:none}
}
@media(max-width:480px){
  .grid4{grid-template-columns:repeat(2,1fr)}
  .grid2{grid-template-columns:1fr}
  .main{padding:12px;padding-bottom:72px}
  .quick-btn{min-width:100px}
}
</style>
</head>

function setLang(lang){ currentLang=lang; localStorage.setItem('sc_lang',lang); applyLang(); }

/* ── THEME ── */
function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  localStorage.setItem('sc_theme',isDark?'light':'dark');
  document.getElementById('icon-sun').style.display=isDark?'block':'none';
  document.getElementById('icon-moon').style.display=isDark?'none':'block';
}

/* ── VIEWS ── */
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.sitem').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.mob-nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  const si=document.getElementById('nav-'+name);
  if(si) si.classList.add('active');
  const mb=document.getElementById('mob-'+name);
  if(mb) mb.classList.add('active');
  if(name==='users'){ loadPendingUsers(); loadAllUsers(); }
  if(name==='food'){ foodLoadToday(); }
}

/* ── LOGOUT ── */
function logout(){
  localStorage.removeItem('sc_token'); localStorage.removeItem('sc_user');
  sessionStorage.removeItem('sc_token'); sessionStorage.removeItem('sc_user');
  window.location.href='/index.html';
}

/* ── TOAST ── */
function toast(msg, type='info'){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className='toast toast-'+type;
  t.textContent=msg;
  c.appendChild(t);
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>t.classList.add('show')); });
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),300); },3000);
}

/* ── ADMIN API ── */
const ADMIN_URL = 'https://primary-production-4b93e.up.railway.app/webhook/sc/admin';

/* ── INIT ── */
(function init(){
  const savedTheme=localStorage.getItem('sc_theme');
  if(savedTheme){
    document.documentElement.setAttribute('data-theme',savedTheme);
    document.getElementById('icon-sun').style.display=savedTheme==='dark'?'none':'block';
    document.getElementById('icon-moon').style.display=savedTheme==='dark'?'block':'none';
  }
  applyLang();
  loadPendingBadge();
})();

function getToken(){
  return localStorage.getItem('sc_token') || sessionStorage.getItem('sc_token') || '';
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function adminFetch(action, data){
  const body = Object.assign({ token: getToken(), action }, data||{});
  const r = await fetch(ADMIN_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const text = await r.text();
  return text ? JSON.parse(text) : {};
}

/* Badge — кількість pending */
async function loadPendingBadge(){
  const user = getUser();
  if(user.role !== 'admin') return;
  try{
    const d = await adminFetch('list_pending');
    const count = (d.users||[]).length;
    const badge = document.getElementById('pendingBadge');
    const navUsers = document.getElementById('nav-users');
    if(!badge) return;
    if(count > 0){
      badge.textContent = count;
      badge.classList.add('show');
      if(navUsers) navUsers.style.display = '';
    } else {
      badge.classList.remove('show');
    }
  }catch(e){ console.error('badge error', e); }
}

/* Завантаження pending пользователей */
async function loadPendingUsers(){
  const loading = document.getElementById('usersLoading');
  const empty   = document.getElementById('usersEmpty');
  const list    = document.getElementById('pendingList');
  loading.style.display = 'block';
  empty.style.display   = 'none';
  list.innerHTML        = '';
  try{
    const d = await adminFetch('list_pending');
    loading.style.display = 'none';
    const users = d.users || [];
    if(!users.length){ empty.style.display = 'block'; return; }
    list.innerHTML = users.map(u => {
      const created = new Date(u.created_at).toLocaleDateString('ru-RU');
      return `<div class="req-card">
        <div class="req-card-body">
          <div class="req-card-name">${esc(u.first_name)} ${esc(u.last_name)}</div>
          <div class="req-card-row">Login: ${esc(u.login)}</div>
          <div class="req-card-row">Email: ${esc(u.email)}</div>
          <div class="req-card-row" style="margin-top:6px;font-size:11px;color:var(--muted2)">${created}</div>
        </div>
        <div class="req-card-footer">
          <button class="btn-success" onclick="approveUser(${u.id})">${t('approve')}</button>
          <button class="btn-danger"  onclick="deleteUser(${u.id})">${t('reject')}</button>
        </div>
      </div>`;
    }).join('');
  }catch(e){
    loading.style.display = 'none';
    empty.style.display   = 'block';
  }
}

/* Завантаження всіх пользователей */
async function loadAllUsers(){
  const tbody = document.getElementById('allUsersTbody');
  tbody.innerHTML = `<tr><td colspan="7" class="loading-state">${t('loading')}</td></tr>`;
  try{
    const d = await adminFetch('list_users');
    const users = d.users || [];
    if(!users.length){ tbody.innerHTML = `<tr><td colspan="7" class="loading-state">${t('usersEmpty')}</td></tr>`; return; }
    const statusMap = { active:'tag-green', pending:'tag-amber', blocked:'tag-red' };
    tbody.innerHTML = users.map(u => {
      const created = new Date(u.created_at).toLocaleDateString('ru-RU');
      const stCls   = statusMap[u.status] || 'tag-gray';
      const stLbl   = t('status_'+u.status) || u.status;
      // SVG иконки
      const svgBlock   = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 3l6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>`;
      const svgUnblock = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M4 6l1.5 1.5L8 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      const svgDelete  = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 3h8M5 3V2h2v1M4.5 5v3.5M7.5 5v3.5M3 3l.5 6.5h5L9 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      const btns = u.status === 'blocked'
        ? `<button class="act-btn" onclick="unblockUser(${u.id})" title="${t('unblock')}">${svgUnblock}</button>
           <button class="act-btn del" onclick="deleteUser(${u.id})" title="${t('deleteUser')}">${svgDelete}</button>`
        : `<button class="act-btn del" onclick="blockUser(${u.id})" title="${t('block')}">${svgBlock}</button>
           <button class="act-btn del" onclick="deleteUser(${u.id})" title="${t('deleteUser')}">${svgDelete}</button>`;
      return `<tr>
        <td style="font-weight:500">${esc(u.first_name)} ${esc(u.last_name)}</td>
        <td style="color:var(--muted)">${esc(u.login)}</td>
        <td style="color:var(--muted)">${esc(u.email)}</td>
        <td>${esc(u.role)}</td>
        <td><span class="tag ${stCls}">${stLbl}</span></td>
        <td style="color:var(--muted)">${created}</td>
        <td><div style="display:flex;gap:4px">${btns}</div></td>
      </tr>`;
    }).join('');
  }catch(e){
    tbody.innerHTML = `<tr><td colspan="7" class="loading-state">${t('errConnection')}</td></tr>`;
  }
}

async function approveUser(userId){
  try{
    const d = await adminFetch('approve', { user_id: userId });
    if(d.success){ toast(t('userApproved'), 'success'); await loadPendingUsers(); await loadAllUsers(); await loadPendingBadge(); }
    else{ toast(d.error || t('errConnection'), 'error'); }
  }catch(e){ toast(t('errConnection'), 'error'); }
}

async function blockUser(userId){
  try{
    const d = await adminFetch('block', { user_id: userId });
    if(d.success){ toast(t('userBlocked'), 'info'); await loadAllUsers(); }
    else{ toast(d.error || t('errConnection'), 'error'); }
  }catch(e){ toast(t('errConnection'), 'error'); }
}

async function unblockUser(userId){
  try{
    const d = await adminFetch('unblock', { user_id: userId });
    if(d.success){ toast(t('userUnblocked'), 'success'); await loadAllUsers(); }
    else{ toast(d.error || t('errConnection'), 'error'); }
  }catch(e){ toast(t('errConnection'), 'error'); }
}

async function deleteUser(userId){
  try{
    const d = await adminFetch('delete', { user_id: userId });
    if(d.success){ toast(t('userDeleted'), 'info'); await loadPendingUsers(); await loadAllUsers(); await loadPendingBadge(); }
    else{ toast(d.error || t('errConnection'), 'error'); }
  }catch(e){ toast(t('errConnection'), 'error'); }
}

/* ── NUTRITION MODULE ── */
const NUTRITION_URL = 'https://primary-production-4b93e.up.railway.app/webhook/sc/nutrition';
const FOOD_GOAL = { kcal:2400, prot:140, fat:80, carb:280 };
let foodMeals = [];

const mealIcons = { breakfast:['🥣','🍳','🥞','☕'], lunch:['🍲','🥗','🍜','🫕'], dinner:['🍽️','🥩','🐟','🥦'], snack:['🍎','🥜','🍫','🧃'] };
const mealColors = [{bg:'#FAEEDA',col:'#854F0B'},{bg:'#E1F5EE',col:'#0F6E56'},{bg:'#E6F1FB',col:'#185FA5'},{bg:'#EAF3DE',col:'#3B6D11'},{bg:'#EEEDFE',col:'#534AB7'},{bg:'#FAECE7',col:'#993C1D'}];

function foodGetMealKey(){
  const sel = document.getElementById('food-meal-type');
  if(!sel) return 'snack';
  const v = (sel.options[sel.selectedIndex]||{}).text||'';
  const vl = v.toLowerCase();
  if(vl.includes('завт')||vl.includes('сніда')||vl.includes('break')) return 'breakfast';
  if(vl.includes('обід')||vl.includes('обед')||vl.includes('lunch')) return 'lunch';
  if(vl.includes('вечер')||vl.includes('dinner')) return 'dinner';
  return 'snack';
}

function foodRenderMeals(){
  const list = document.getElementById('food-meals-list');
  if(!list) return;
  if(!foodMeals.length){
    list.innerHTML = `<div style="text-align:center;padding:24px;color:var(--muted2);font-size:12px">${t('fEmpty')}</div>`;
    return;
  }
  list.innerHTML = foodMeals.map((m,i)=>{
    const c = mealColors[i % mealColors.length];
    const icons = mealIcons[m.meal_type]||mealIcons.snack;
    const icon = icons[i % icons.length];
    return `<div class="food-meal-row">
      <div class="food-meal-icon" style="background:${c.bg};color:${c.col}">${icon}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.dish_name||''}</div>
        <div style="font-size:11px;color:var(--muted)">${m.meal_type_label||''}</div>
      </div>
      <div style="font-size:13px;font-weight:500;color:var(--text);flex-shrink:0">${m.kcal||0}</div>
      <div style="font-size:11px;color:var(--muted);flex-shrink:0;width:42px;text-align:right">${m.time||''}</div>
    </div>`;
  }).join('');
}

function foodUpdateMetrics(){
  const tot = { kcal:0, prot:0, fat:0, carb:0 };
  foodMeals.forEach(m=>{ tot.kcal+=(m.kcal||0); tot.prot+=(m.prot||0); tot.fat+=(m.fat||0); tot.carb+=(m.carb||0); });
  const sv = (id,v,unit) => { const el=document.getElementById(id); if(el) el.innerHTML=v+'<span class="metric-unit">'+unit+'</span>'; };
  sv('f-kcal-val', tot.kcal.toLocaleString(), 'ккал');
  sv('f-prot-val', tot.prot, 'г');
  sv('f-fat-val',  tot.fat,  'г');
  sv('f-carb-val', tot.carb, 'г');
  const pct = Math.min(100, Math.round(tot.kcal/FOOD_GOAL.kcal*100));
  const bar = document.getElementById('food-kcal-bar'); if(bar) bar.style.width=pct+'%';
  const el_eaten = document.getElementById('food-bar-eaten');
  const el_goal  = document.getElementById('food-bar-goal');
  if(el_eaten) el_eaten.textContent = tot.kcal.toLocaleString()+' '+t('fEatenLabel');
  if(el_goal)  el_goal.textContent  = FOOD_GOAL.kcal.toLocaleString()+' '+t('fGoalLabel');
  const rem = FOOD_GOAL.kcal - tot.kcal;
  const tip = document.getElementById('food-tip-box');
  if(tip){
    tip.dataset.default = '0';
    if(rem > 0){
      const lm = currentLang;
      if(lm==='ru') tip.innerHTML = `До цели осталось <strong>${rem} ккал</strong>. Белков съедено ${tot.prot}г из ${FOOD_GOAL.prot}г.`;
      else if(lm==='uk') tip.innerHTML = `До цілі залишилось <strong>${rem} ккал</strong>. Білків з\'їдено ${tot.prot}г з ${FOOD_GOAL.prot}г.`;
      else tip.innerHTML = `<strong>${rem} kcal</strong> left to goal. Protein: ${tot.prot}g of ${FOOD_GOAL.prot}g.`;
    } else {
      const lm = currentLang;
      tip.innerHTML = lm==='ru'?'<strong>Цель по калориям достигнута!</strong> Следи за балансом.':
                      lm==='uk'?'<strong>Ціль по калоріях досягнута!</strong> Стежи за балансом.':
                      '<strong>Calorie goal reached!</strong> Watch your balance.';
    }
  }
}

async function foodLoadToday(){
  const list = document.getElementById('food-meals-list');
  if(list) list.innerHTML = `<div style="text-align:center;padding:24px;color:var(--muted2);font-size:12px">${t('fLoading')}</div>`;
  try{
    const body = JSON.stringify({ token: getToken(), action:'get_today' });
    const r = await fetch(NUTRITION_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body });
    const text = await r.text();
    const d = text ? JSON.parse(text) : {};
    if(d.success && Array.isArray(d.meals)){
      foodMeals = d.meals.map(m=>({
        ...m,
        time: m.logged_at ? new Date(m.logged_at).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}) : '',
        meal_type_label: t('fOpt'+(m.meal_type||'snack').charAt(0).toUpperCase()+(m.meal_type||'snack').slice(1))
      }));
    } else { foodMeals = []; }
  }catch(e){ console.error('foodLoadToday',e); foodMeals=[]; }
  foodRenderMeals();
  foodUpdateMetrics();
}

async function foodSaveToServer(meal){
  try{
    const body = JSON.stringify({ token: getToken(), action:'add_meal', ...meal });
    const r = await fetch(NUTRITION_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body });
    const text = await r.text();
    return text ? JSON.parse(text) : {};
  }catch(e){ return {}; }
}

async function foodAddManual(){
  const name = (document.getElementById('food-name')||{}).value||'';
  const kcal = parseInt((document.getElementById('food-inp-kcal')||{}).value)||0;
  const prot = parseInt((document.getElementById('food-inp-prot')||{}).value)||0;
  const fat  = parseInt((document.getElementById('food-inp-fat')||{}).value)||0;
  const carb = parseInt((document.getElementById('food-inp-carb')||{}).value)||0;
  if(!name && !kcal){ const el=document.getElementById('food-name'); if(el) el.focus(); return; }
  const mealType = foodGetMealKey();
  const meal = { dish_name: name||'?', meal_type: mealType, kcal, prot, fat, carb };
  await foodSaveToServer(meal);
  foodMeals.push({ ...meal, time: new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}), meal_type_label: t('fOpt'+mealType.charAt(0).toUpperCase()+mealType.slice(1)) });
  foodRenderMeals(); foodUpdateMetrics();
  document.getElementById('food-upload-section').style.display='none';
  document.getElementById('food-success').style.display='block';
}

function foodReset(){
  document.getElementById('food-upload-section').style.display='block';
  document.getElementById('food-success').style.display='none';
  ['food-name','food-inp-kcal','food-inp-prot','food-inp-fat','food-inp-carb'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
}
